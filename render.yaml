services:
  - type: web
    name: sheets-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/status
    envVars:
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CHECK_INTERVAL_CRON
        value: "0 * * * *"
      - key: DASHBOARD_PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: ERROR_ALERT_SNOOZE_HOURS
        value: "6"
