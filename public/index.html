<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheets Monitor Bot — Dashboard</title>
  <meta name="description" content="Real-time dashboard for monitoring Google Sheets changes in the current month." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:    #0d1117;
      --bg-secondary:  #161b22;
      --bg-card:       #1c2128;
      --bg-hover:      #21262d;
      --border:        #30363d;
      --border-light:  #21262d;
      --accent:        #58a6ff;
      --accent-glow:   rgba(88, 166, 255, 0.15);
      --green:         #3fb950;
      --green-bg:      rgba(63, 185, 80, 0.1);
      --yellow:        #d29922;
      --yellow-bg:     rgba(210, 153, 34, 0.1);
      --red:           #f85149;
      --red-bg:        rgba(248, 81, 73, 0.1);
      --text-primary:  #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:    #484f58;
      --radius:        10px;
      --radius-sm:     6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .logo-icon { font-size: 1.3rem; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    #last-check-time { color: var(--accent); font-weight: 500; }

    /* ── Main Layout ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    /* ── Stats Row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .stat-card.blue::before  { background: var(--accent); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.yellow::before{ background: var(--yellow); }
    .stat-card.red::before   { background: var(--red); }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-card.blue   .stat-value { color: var(--accent); }
    .stat-card.green  .stat-value { color: var(--green); }
    .stat-card.yellow .stat-value { color: var(--yellow); }
    .stat-card.red    .stat-value { color: var(--red); }
    .stat-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .filter-btn.active-green { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .filter-btn.active-yellow { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }

    /* ── Change cards ── */
    #changes-list { display: flex; flex-direction: column; gap: 12px; }

    .change-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .change-card:hover {
      border-color: var(--border-light);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .change-card.new-row   { border-left: 3px solid var(--green); }
    .change-card.modified  { border-left: 3px solid var(--yellow); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: var(--bg-hover); }
    .card-left { display: flex; align-items: center; gap: 10px; }
    .type-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .type-badge.new      { background: var(--green-bg);  color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
    .type-badge.modified { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }

    .card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .card-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .chevron {
      color: var(--text-muted);
      font-size: 0.8rem;
      transition: transform 0.2s;
    }
    .change-card.open .chevron { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border-light);
    }
    .change-card.open .card-body { display: block; }

    /* Row data table */
    .row-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-top: 12px;
    }
    .row-table th {
      text-align: left;
      padding: 6px 10px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .row-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      word-break: break-word;
    }
    .row-table tr:last-child td { border-bottom: none; }
    .row-table tr:hover td { background: var(--bg-hover); }

    .diff-before { color: var(--red);   text-decoration: line-through; opacity: 0.7; }
    .diff-after  { color: var(--green); }
    .diff-arrow  { color: var(--text-muted); margin: 0 6px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state p  { font-size: 0.85rem; }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 12px;
      color: var(--text-secondary);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Refresh button ── */
    .refresh-btn {
      padding: 7px 16px;
      background: var(--accent-glow);
      border: 1px solid rgba(88,166,255,0.3);
      color: var(--accent);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover { background: rgba(88,166,255,0.25); }
    .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; display: inline-block; }

    /* ── Acknowledge Button & Badge ── */
    .ack-btn {
      padding: 6px 12px;
      background: var(--yellow-bg);
      border: 1px solid rgba(210,153,34,0.3);
      color: var(--yellow);
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .ack-btn:hover { background: rgba(210,153,34,0.25); }
    .ack-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .ack-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--green-bg);
      border: 1px solid rgba(63,185,80,0.3);
      color: var(--green);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 500;
      margin-top: 12px;
    }

    /* ── Month header ── */
    .month-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 24px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .search-input-field:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--accent);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .main { padding: 16px 12px; }
      .header { padding: 0 12px; }
      .header-inner {
        flex-direction: column;
        height: auto;
        padding: 12px 0;
        gap: 8px;
        align-items: flex-start;
      }
      .header-right {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .search-bar {
        flex-direction: column;
        align-items: stretch !important;
        padding: 12px 14px !important;
      }
      
      .search-bar > div:first-child {
        min-width: 100% !important;
      }
      
      .search-bar > div:last-child {
        min-width: 100% !important;
        justify-content: space-between !important;
        gap: 8px !important;
      }
      
      .search-bar input[type="date"] {
        flex-grow: 1;
        width: 100%;
      }
      
      .card-header {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 10px;
        padding: 12px 14px;
      }
      
      .card-left {
        flex-wrap: wrap;
        gap: 6px;
      }
      
      .card-header > div:last-child {
        width: 100%;
        justify-content: space-between;
        border-top: 1px solid var(--border-light);
        padding-top: 8px;
      }
      
      .tab-bar {
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }
      
      .tab-btn {
        padding: 8px 12px;
        font-size: 0.85rem;
      }

      .scroll-to-top {
        bottom: 20px;
        right: 20px;
        width: 48px;
        height: 48px;
        font-size: 1.3rem;
      }
    }

    /* ── Scroll to Top Button ── */
    .scroll-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), 0 0 12px var(--accent-glow);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 999;
    }
    .scroll-to-top:hover {
      background: #4791db;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6), 0 0 20px var(--accent);
    }
    .scroll-to-top.visible {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📊</span>
      Sheets Monitor Bot
      <div class="status-dot" title="Bot is running"></div>
    </div>
    <div class="header-right">
      <span id="db-status-badge" class="type-badge" style="cursor: help; text-transform: none; display: inline-flex; align-items: center; gap: 4px;" title="Checking database...">Database: —</span>
      Last check: <span id="last-check-time">—</span>
      <button class="refresh-btn" id="trigger-btn" onclick="triggerManualCheck()" style="background: rgba(88,166,255,0.05); color: var(--accent); border-color: rgba(88,166,255,0.2); margin-right: 8px;">
        <span class="refresh-icon">⏱</span> Run Check Now
      </button>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <span class="refresh-icon">↻</span> Refresh
      </button>
    </div>
  </div>
</header>

<!-- ── Main ── -->
<main class="main">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card blue">
      <div class="stat-label">Total Checks</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">Since bot started</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">New Rows Found</div>
      <div class="stat-value" id="stat-new">—</div>
      <div class="stat-sub">This month</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">Modified Rows</div>
      <div class="stat-value" id="stat-modified">—</div>
      <div class="stat-sub">This month</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Errors</div>
      <div class="stat-value" id="stat-errors">—</div>
      <div class="stat-sub">Total errors</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-changelog" onclick="setTab('changelog')">📋 Change Log</button>
    <button class="tab-btn"        id="tab-bookings"  onclick="setTab('bookings')">📅 Current Bookings</button>
    <button class="tab-btn"        id="tab-allbookings" onclick="setTab('allbookings')">🌎 All Bookings</button>
  </div>

  <!-- Category Filters (only for Change Log) -->
  <div class="filter-bar" id="category-filters" style="margin-bottom: 16px;">
    <button class="filter-btn active" id="filter-all"      onclick="setFilter('all')">All</button>
    <button class="filter-btn"        id="filter-new"      onclick="setFilter('new')">🟢 New Rows</button>
    <button class="filter-btn"        id="filter-modified" onclick="setFilter('modified')">🟡 Modified</button>
    <button class="filter-btn"        id="filter-error"    onclick="setFilter('error')">🔴 Errors</button>
  </div>

  <!-- Search and Date Filter (shared) -->
  <div class="search-bar" style="margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: var(--bg-card); border: 1px solid var(--border); padding: 14px 18px; border-radius: var(--radius);">
    <div style="position: relative; flex-grow: 2; min-width: 280px;">
      <input type="text" id="search-input" class="search-input-field" placeholder="Search by name, check-in, or check-out (e.g. Jolene, 30th May)..." oninput="handleSearch()" style="width: 100%; padding: 8px 12px 8px 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem; outline: none; transition: border-color 0.2s;">
      <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.85rem; pointer-events: none;">🔍</span>
    </div>
    <div style="display: flex; gap: 12px; align-items: center; flex-grow: 1; min-width: 450px; justify-content: flex-end; flex-wrap: wrap;">
      <div style="display: flex; gap: 6px; align-items: center;">
        <span style="font-size: 0.8rem; color: var(--text-secondary);">Check-In:</span>
        <input type="date" id="checkin-date-input" class="search-input-field" onchange="handleDateSelect()" style="padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem; outline: none; transition: border-color 0.2s;">
      </div>
      <div style="display: flex; gap: 6px; align-items: center;">
        <span style="font-size: 0.8rem; color: var(--text-secondary);">Check-Out:</span>
        <input type="date" id="checkout-date-input" class="search-input-field" onchange="handleDateSelect()" style="padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem; outline: none; transition: border-color 0.2s;">
      </div>
      <div id="month-filter-container" style="display: none; gap: 6px; align-items: center;">
        <span style="font-size: 0.8rem; color: var(--text-secondary);">Month:</span>
        <select id="month-filter-input" class="search-input-field" onchange="handleMonthSelect()" style="padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem; outline: none; transition: border-color 0.2s; cursor: pointer;">
          <option value="">All Months</option>
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
      </div>
      <button class="refresh-btn" onclick="clearDateFilters()" style="padding: 7px 12px; font-size: 0.8rem; border-radius: var(--radius-sm);">Clear Dates</button>
    </div>
  </div>

  <!-- Header Title with Item Count badge -->
  <div class="section-header">
    <div class="section-title" id="view-title">
      📋 Change Log
    </div>
    <span class="badge" id="items-count-badge">0 events</span>
  </div>

  <div id="changes-list">
    <div class="loading"><div class="spinner"></div> Loading…</div>
  </div>

</main>

<script>
  let allHistory = [];
  let currentBookings = [];
  let allBookings = [];
  let bookingsHeaders = [];
  let activeFilter = 'all';

  // ── Trigger manual sheet check from dashboard ──
  async function triggerManualCheck() {
    const btn = document.getElementById('trigger-btn');
    if (!btn) return;
    
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="refresh-icon spinning">⏱</span> Checking...';
    
    try {
      const res = await fetch('/api/check', { method: 'POST' });
      const data = await res.json();
      
      if (res.ok && data.success) {
        await loadData();
        showToast('✅ Sheet check completed successfully!');
      } else {
        showToast('❌ Error: ' + (data.error || 'Failed to complete check.'));
      }
    } catch (err) {
      console.error(err);
      showToast('❌ Network error while triggering check.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  }

  // ── Acknowledge card from dashboard ──
  async function acknowledgeCard(eventId, category, buttonEl, event) {
    if (event) event.stopPropagation();
    if (!eventId) return;
    
    buttonEl.disabled = true;
    const originalText = buttonEl.textContent;
    buttonEl.textContent = 'Acknowledging...';
    
    try {
      const res = await fetch('/api/history/acknowledge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: eventId, user: 'Dashboard User', category })
      });
      
      if (res.ok) {
        await loadData();
      } else {
        showToast('❌ Failed to acknowledge event.');
        buttonEl.disabled = false;
        buttonEl.textContent = originalText;
      }
    } catch (err) {
      console.error(err);
      showToast('❌ Error connecting to server.');
      buttonEl.disabled = false;
      buttonEl.textContent = originalText;
    }
  }

    btn.classList.add('spinning');

    try {
      const [historyRes, statusRes, currentBookingsRes, allBookingsRes] = await Promise.all([
        fetch('/api/history'),
        fetch('/api/status'),
        fetch('/api/current-bookings'),
        fetch('/api/all-bookings'),
      ]);
      allHistory = await historyRes.json();
      const status = await statusRes.json();
      
      const currentBookingsData = await currentBookingsRes.json();
      currentBookings = currentBookingsData.bookings || [];
      bookingsHeaders = currentBookingsData.headers || [];

      const allBookingsData = await allBookingsRes.json();
      allBookings = allBookingsData.bookings || [];

      updateStats();
      renderContent();

      const lastCheck = status.lastCheck
        ? new Date(status.lastCheck).toLocaleString()
        : 'Never';
      document.getElementById('last-check-time').textContent = lastCheck;

      // Update Database Status Badge
      const dbBadge = document.getElementById('db-status-badge');
      if (dbBadge && status.dbStatus) {
        if (status.dbStatus.connected) {
          dbBadge.style.backgroundColor = 'var(--green-bg)';
          dbBadge.style.color = 'var(--green)';
          dbBadge.style.borderColor = 'rgba(63,185,80,0.3)';
          dbBadge.style.borderStyle = 'solid';
          dbBadge.style.borderWidth = '1px';
          dbBadge.textContent = '🔌 DB: Connected';
          dbBadge.title = 'Successfully connected to MongoDB. Data is persistent across restarts.';
        } else {
          dbBadge.style.backgroundColor = 'var(--red-bg)';
          dbBadge.style.color = 'var(--red)';
          dbBadge.style.borderColor = 'rgba(248,81,73,0.3)';
          dbBadge.style.borderStyle = 'solid';
          dbBadge.style.borderWidth = '1px';
          dbBadge.textContent = '⚠️ DB: Local Fallback';
          dbBadge.title = 'Using ephemeral local fallback (WARNING: Data will be lost when Render restarts!).\nError: ' + (status.dbStatus.error || 'Unknown error');
        }
      }

    } catch (err) {
      console.error('Failed to load data:', err);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── Update stat cards ───────────────────────────────────────────────────────
  function updateStats() {
    let newCount = 0, modCount = 0, errCount = 0;
    for (const event of allHistory) {
      if (event.error) { errCount++; continue; }
      newCount += (event.newRows || []).length;
      modCount += (event.modifiedRows || []).length;
    }
    document.getElementById('stat-total').textContent    = allHistory.length;
    document.getElementById('stat-new').textContent      = newCount;
    document.getElementById('stat-modified').textContent = modCount;
    document.getElementById('stat-errors').textContent   = errCount;

  // Helper to parse dates client-side
  function parseClientDate(value) {
    if (!value || typeof value !== 'string') return null;
    const trimmed = value.trim();
    if (!trimmed) return null;

    // Try standard parsing first
    const d = new Date(trimmed);
    if (!isNaN(d)) return d;

    // Try dd/mm/yyyy or dd-mm-yyyy
    const dmyMatch = trimmed.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (dmyMatch) {
      const [, day, month, year] = dmyMatch;
      const parsed = new Date(`${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`);
      if (!isNaN(parsed)) return parsed;
    }

    // Handle formats like "30th May", "2nd June", "24thJuly"
    const dayMatch = trimmed.match(/^(\d+)/);
    if (dayMatch) {
      const day = parseInt(dayMatch[1], 10);
      const rest = trimmed.toLowerCase();

      let month = -1;
      if (rest.includes('jan')) month = 0;
      else if (rest.includes('feb')) month = 1;
      else if (rest.includes('mar')) month = 2;
      else if (rest.includes('apr')) month = 3;
      else if (rest.includes('may')) month = 4;
      else if (rest.includes('jun')) month = 5;
      else if (rest.includes('jul')) month = 6;
      else if (rest.includes('aug')) month = 7;
      else if (rest.includes('sep')) month = 8;
      else if (rest.includes('oct')) month = 9;
      else if (rest.includes('nov')) month = 10;
      else if (rest.includes('dec')) month = 11;

      if (month !== -1) {
        // Assume current year 2026 for textual relative dates
        const year = 2026;
        return new Date(year, month, day);
      }
    }
    return null;
  }

  function isSameDay(d1, d2) {
    return d1.getFullYear() === d2.getFullYear() &&
           d1.getMonth() === d2.getMonth() &&
           d1.getDate() === d2.getDate();
  }

  // ── Render content ──────────────────────────────────────────────────────────
  function renderContent() {
    const container = document.getElementById('changes-list');
    const badgeCountEl = document.getElementById('items-count-badge');

    const searchQuery = document.getElementById('search-input')?.value.toLowerCase().trim() || '';
    const checkinDateVal = document.getElementById('checkin-date-input')?.value || '';
    const checkoutDateVal = document.getElementById('checkout-date-input')?.value || '';
    const monthFilterVal = document.getElementById('month-filter-input')?.value || '';

    let parsedCheckInDate = null;
    if (checkinDateVal) {
      parsedCheckInDate = new Date(checkinDateVal);
    }

    let parsedCheckOutDate = null;
    if (checkoutDateVal) {
      parsedCheckOutDate = new Date(checkoutDateVal);
    }

    if (activeTab === 'changelog') {
      // --- Render Change Log ---
      const items = [];
      for (const event of allHistory) {
        if (event.error) {
          items.push({ type: 'error', event });
          continue;
        }
        for (const row of (event.newRows || [])) {
          items.push({ 
            type: 'new', 
            row, 
            checkedAt: event.checkedAt,
            eventId: event.id,
            acknowledgedReception: event.acknowledgedReception || false,
            acknowledgedReceptionBy: event.acknowledgedReceptionBy || null,
            acknowledgedReceptionAt: event.acknowledgedReceptionAt || null,
            acknowledgedDiveCenter: event.acknowledgedDiveCenter || false,
            acknowledgedDiveCenterBy: event.acknowledgedDiveCenterBy || null,
            acknowledgedDiveCenterAt: event.acknowledgedDiveCenterAt || null
          });
        }
        for (const row of (event.modifiedRows || [])) {
          items.push({ 
            type: 'modified', 
            row, 
            checkedAt: event.checkedAt,
            eventId: event.id,
            acknowledgedReception: event.acknowledgedReception || false,
            acknowledgedReceptionBy: event.acknowledgedReceptionBy || null,
            acknowledgedReceptionAt: event.acknowledgedReceptionAt || null,
            acknowledgedDiveCenter: event.acknowledgedDiveCenter || false,
            acknowledgedDiveCenterBy: event.acknowledgedDiveCenterBy || null,
            acknowledgedDiveCenterAt: event.acknowledgedDiveCenterAt || null
          });
        }
      }

      // Filter by category
      let filtered = activeFilter === 'all'
        ? items
        : items.filter(i => i.type === activeFilter);

      // Filter by search query / dates
      if (searchQuery || parsedCheckInDate || parsedCheckOutDate) {
        filtered = filtered.filter(item => {
          if (item.type === 'error') {
            return searchQuery ? item.event.error.toLowerCase().includes(searchQuery) : true;
          }

          const rowData = item.row.row || [];
          const name = (rowData[3] || '').toString().toLowerCase();
          const checkInStr = (rowData[7] || '').toString();
          const checkOutStr = (rowData[8] || '').toString();

          if (searchQuery) {
            const matchesName = name.includes(searchQuery);
            const matchesCheckIn = checkInStr.toLowerCase().includes(searchQuery);
            const matchesCheckOut = checkOutStr.toLowerCase().includes(searchQuery);
            if (!matchesName && !matchesCheckIn && !matchesCheckOut) return false;
          }

          if (parsedCheckInDate) {
            const checkInDate = parseClientDate(checkInStr);
            const checkInMatches = checkInDate && isSameDay(checkInDate, parsedCheckInDate);
            if (!checkInMatches) return false;
          }

          if (parsedCheckOutDate) {
            const checkOutDate = parseClientDate(checkOutStr);
            const checkOutMatches = checkOutDate && isSameDay(checkOutDate, parsedCheckOutDate);
            if (!checkOutMatches) return false;
          }

          return true;
        });
      }

      badgeCountEl.textContent = `${filtered.length} event${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        if (!searchQuery && !parsedCheckInDate && !parsedCheckOutDate && items.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📋</div>
              <h3>No changes detected yet</h3>
              <p>The bot will notify you here and on Telegram<br>when it finds new or modified rows this month.</p>
            </div>`;
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">🔍</div>
              <h3>No matching changes found</h3>
              <p>Try adjusting your search query or filters.</p>
            </div>`;
        }
        return;
      }

      container.innerHTML = filtered.map((item, idx) => buildCard(item, idx)).join('');

    } else {
      // --- Render Bookings (Current or All) ---
      let filtered = activeTab === 'bookings' ? [...currentBookings] : [...allBookings];

      // Filter by search query / dates / month
      if (searchQuery || parsedCheckInDate || parsedCheckOutDate || monthFilterVal !== '') {
        filtered = filtered.filter(item => {
          const rowData = item.row || [];
          const name = (rowData[3] || '').toString().toLowerCase();
          const checkInStr = (rowData[7] || '').toString();
          const checkOutStr = (rowData[8] || '').toString();

          if (searchQuery) {
            const matchesName = name.includes(searchQuery);
            const matchesCheckIn = checkInStr.toLowerCase().includes(searchQuery);
            const matchesCheckOut = checkOutStr.toLowerCase().includes(searchQuery);
            if (!matchesName && !matchesCheckIn && !matchesCheckOut) return false;
          }

          if (parsedCheckInDate) {
            const checkInDate = parseClientDate(checkInStr);
            const checkInMatches = checkInDate && isSameDay(checkInDate, parsedCheckInDate);
            if (!checkInMatches) return false;
          }

          if (parsedCheckOutDate) {
            const checkOutDate = parseClientDate(checkOutStr);
            const checkOutMatches = checkOutDate && isSameDay(checkOutDate, parsedCheckOutDate);
            if (!checkOutMatches) return false;
          }

          if (monthFilterVal !== '') {
            const checkInDate = parseClientDate(checkInStr);
            const monthMatches = checkInDate && checkInDate.getMonth() === parseInt(monthFilterVal, 10);
            if (!monthMatches) return false;
          }

          return true;
        });
      }

      badgeCountEl.textContent = `${filtered.length} booking${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        const hasNoBookings = (activeTab === 'bookings' ? currentBookings.length : allBookings.length) === 0;
        if (!searchQuery && !parsedCheckInDate && !parsedCheckOutDate && monthFilterVal === '' && hasNoBookings) {
          const emptyText = activeTab === 'bookings' 
            ? 'No active bookings this month' 
            : 'No bookings found in the Google Sheet';
          const emptyDesc = activeTab === 'bookings'
            ? 'Bookings matching the current month will automatically load here.'
            : 'Check your Google Sheet data and ensure the service account has read access.';
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📅</div>
              <h3>${emptyText}</h3>
              <p>${emptyDesc}</p>
            </div>`;
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">🔍</div>
              <h3>No matching bookings found</h3>
              <p>Try adjusting your search query or date filter.</p>
            </div>`;
        }
        return;
      }

      const sliced = filtered.slice(0, displayLimit);
      let html = sliced.map((booking, idx) => buildBookingCard(booking, idx)).join('');

      if (filtered.length > displayLimit) {
        html += `
          <div style="text-align: center; margin-top: 24px; margin-bottom: 24px;">
            <button class="refresh-btn" onclick="loadMoreBookings()" style="padding: 10px 24px; font-size: 0.88rem; border-radius: var(--radius-sm); margin: 0 auto; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
              ➕ Load More Bookings (${filtered.length - displayLimit} remaining)
            </button>
          </div>`;
      }
      container.innerHTML = html;
    }
  }

  // ── Build a single change card ──────────────────────────────────────────────
  function buildCard(item, idx) {
    const id = `card-${idx}`;

    if (item.type === 'error') {
      return `
        <div class="change-card modified" id="${id}">
          <div class="card-header" onclick="toggleCard('${id}')">
            <div class="card-left">
              <span class="type-badge modified">ERROR</span>
              <span class="card-title">Bot Error</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="card-time">${formatTime(item.event.checkedAt)}</span>
              <span class="chevron">▼</span>
            </div>
          </div>
          <div class="card-body">
            <p style="color:var(--red);font-size:0.85rem;padding-top:12px">${escapeHtml(item.event.error)}</p>
          </div>
        </div>`;
    }

    const row = item.row;
    const headers = row.headers || [];
    const rowData = row.row || [];
    
    // Find customer name, booking code, and check-in date dynamically for a more descriptive card title
    const nameIndex = headers.findIndex(h => h && h.toString().trim().toUpperCase() === 'NAME');
    const codeIndex = headers.findIndex(h => h && h.toString().trim().toUpperCase() === 'CODE');
    const checkInIndex = headers.findIndex(h => h && ['CHECK IN', 'CHECK-IN', 'CHECKIN'].includes(h.toString().trim().toUpperCase()));
    
    const name = nameIndex !== -1 ? (rowData[nameIndex] || '').toString().trim() : (rowData[3] || '').toString().trim();
    const code = codeIndex !== -1 ? (rowData[codeIndex] || '').toString().trim() : (rowData[1] || '').toString().trim();
    const checkIn = checkInIndex !== -1 ? (rowData[checkInIndex] || '').toString().trim() : (rowData[7] || '').toString().trim();
    const roomIndex = headers.findIndex(h => h && h.toString().trim().toUpperCase() === 'ROOM');
    const room = roomIndex !== -1 ? rowData[roomIndex] : '';
    
    const colorIndex = headers.findIndex(h => h && h.toString().trim().toUpperCase() === 'ROW_COLOR');
    const rowColor = colorIndex !== -1 ? (rowData[colorIndex] || 'WHITE') : 'WHITE';

    const remarkIndex = headers.findIndex(h => h && ['REMARK', 'REMARKS'].includes(h.toString().trim().toUpperCase()));
    const remarkVal = remarkIndex !== -1 ? (rowData[remarkIndex] || '') : (rowData[22] || '');
    let remarkBadge = '';
    let titleRemarkInfo = '';

    const isRowWhite = (rowColor === 'WHITE');
    const lowerRemark = remarkVal.toLowerCase();

    // Special remark check (cancel, postpone, double code, duplicate, etc.)
    const isSpecialRemark = lowerRemark.includes('cancel') || lowerRemark.includes('cancle') || lowerRemark.includes('cancled') || lowerRemark.includes('cancelled') ||
                           lowerRemark.includes('postpone') || lowerRemark.includes('postponed') ||
                           lowerRemark.includes('change') || lowerRemark.includes('changed') || lowerRemark.includes('chage') || lowerRemark.includes('chaged') ||
                           lowerRemark.includes('double') || lowerRemark.includes('dup');

    if (isRowWhite) {
      if (isSpecialRemark && remarkVal.toString().trim()) {
        let icon = '';
        let badgeText = '';
        let badgeBg = 'var(--red-bg)';
        let badgeColor = 'var(--red)';
        let badgeBorder = 'rgba(248,81,73,0.3)';

        if (lowerRemark.includes('cancel') || lowerRemark.includes('cancle') || lowerRemark.includes('cancled') || lowerRemark.includes('cancelled')) {
          icon = '❌ ';
          badgeText = '❌ Cancelled';
        } else if (lowerRemark.includes('postpone') || lowerRemark.includes('postponed')) {
          icon = '⏳ ';
          badgeText = '⏳ Postponed';
        } else if (lowerRemark.includes('change') || lowerRemark.includes('changed') || lowerRemark.includes('chage') || lowerRemark.includes('chaged')) {
          icon = '🔄 ';
          badgeText = '🔄 Changed';
        } else if (lowerRemark.includes('double') || lowerRemark.includes('dup')) {
          icon = '⚠️ ';
          badgeText = '⚠️ Double Code';
        }

        if (badgeText) {
          remarkBadge = `<span class="type-badge" style="background:${badgeBg};color:${badgeColor};border:1px solid ${badgeBorder};text-transform:none;margin-left:4px;display:inline-flex;align-items:center;gap:4px">${badgeText}</span>`;
        }
        titleRemarkInfo = ` • ${icon}${remarkVal.toString().trim()}`;
      }
    }

    const cardTitle = name 
      ? `${name}${code ? ` (${code})` : ''}${checkIn ? ` • In: ${checkIn}` : ''}${room && room !== '—' ? ` • 🚪 ${room}` : ''}${titleRemarkInfo}` 
      : (rowData[0] || '—');
    const typeLabel = item.type === 'new' ? 'NEW ROW' : 'MODIFIED';
    const cardClass = item.type === 'new' ? 'new-row' : 'modified';
    const badgeClass = item.type === 'new' ? 'new' : 'modified';

    let bodyHtml = '';

    if (item.type === 'new') {
      // Show all non-empty cells
      const rows = headers
        .map((h, i) => {
          const val = (rowData[i] || '').toString().trim();
          if (!val) return '';
          if (['TOTAL AMOUNT', 'DEPOSIT', 'BALANCE', 'STATUS', 'ROW_COLOR', 'ROOM', 'ROOM_PAX'].includes(h.toUpperCase().trim())) return '';
          return `<tr><td style="color:var(--text-secondary);width:35%">${escapeHtml(h)}</td><td>${escapeHtml(val)}</td></tr>`;
        })
        .filter(Boolean)
        .join('');

      bodyHtml = `
        <table class="row-table" style="margin-top:12px">
          <thead><tr><th>Column</th><th>Value</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="2" style="color:var(--text-muted)">No data</td></tr>'}</tbody>
        </table>`;

    } else {
      // Show only changed cells with before/after
      const changes = (row.changes || []);
      const changesRows = changes
        .map(c => {
          if (['TOTAL AMOUNT', 'DEPOSIT', 'BALANCE', 'STATUS', 'ROW_COLOR', 'ROOM', 'ROOM_PAX'].includes(c.column.toUpperCase().trim())) return '';
          return `
            <tr>
              <td style="color:var(--text-secondary);width:30%">${escapeHtml(c.column)}</td>
              <td>
                <span class="diff-before">${escapeHtml(c.before) || '(empty)'}</span>
                <span class="diff-arrow">→</span>
                <span class="diff-after">${escapeHtml(c.after) || '(empty)'}</span>
              </td>
            </tr>`;
        })
        .filter(Boolean)
        .join('');

      // Show full row data
      const fullRows = headers
        .map((h, i) => {
          const val = (rowData[i] || '').toString().trim();
          if (!val) return '';
          if (['TOTAL AMOUNT', 'DEPOSIT', 'BALANCE', 'STATUS', 'ROW_COLOR', 'ROOM', 'ROOM_PAX'].includes(h.toUpperCase().trim())) return '';
          return `<tr><td style="color:var(--text-secondary);width:35%">${escapeHtml(h)}</td><td>${escapeHtml(val)}</td></tr>`;
        })
        .filter(Boolean)
        .join('');

      bodyHtml = `
        <div style="margin-top: 12px; font-weight: 600; font-size: 0.85rem; color: var(--yellow);">⚡ Changes:</div>
        <table class="row-table" style="margin-top:6px; margin-bottom: 16px;">
          <thead><tr><th>Column</th><th>Change</th></tr></thead>
          <tbody>${changesRows}</tbody>
        </table>
        
        <div style="font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">📋 Full Row Data:</div>
        <table class="row-table" style="margin-top:6px;">
          <thead><tr><th>Column</th><th>Value</th></tr></thead>
          <tbody>${fullRows || '<tr><td colspan="2" style="color:var(--text-muted)">No data</td></tr>'}</tbody>
        </table>`;
    }

    let ackHtml = '';
    if (item.type !== 'error') {
      const ackRec = item.acknowledgedReception;
      const ackRecBy = item.acknowledgedReceptionBy;
      const ackRecAt = item.acknowledgedReceptionAt;

      const ackDiv = item.acknowledgedDiveCenter;
      const ackDivBy = item.acknowledgedDiveCenterBy;
      const ackDivAt = item.acknowledgedDiveCenterAt;

      let recPart = '';
      if (ackRec) {
        recPart = `
          <span class="ack-badge">
            🛎 Reception: Acknowledged by ${escapeHtml(ackRecBy)} ${ackRecAt ? `at ${new Date(ackRecAt).toLocaleTimeString()}` : ''}
          </span>`;
      } else if (item.eventId) {
        recPart = `
          <button class="ack-btn" onclick="acknowledgeCard('${item.eventId}', 'reception', this, event)">
            🛎 Acknowledge Reception
          </button>`;
      }

      let divPart = '';
      if (ackDiv) {
        divPart = `
          <span class="ack-badge" style="background:var(--accent-glow);color:var(--accent);border-color:rgba(88,166,255,0.3)">
            🤿 Dive Center: Acknowledged by ${escapeHtml(ackDivBy)} ${ackDivAt ? `at ${new Date(ackDivAt).toLocaleTimeString()}` : ''}
          </span>`;
      } else if (item.eventId) {
        divPart = `
          <button class="ack-btn" style="background:var(--accent-glow);color:var(--accent);border-color:rgba(88,166,255,0.3)" onclick="acknowledgeCard('${item.eventId}', 'dive_center', this, event)">
            🤿 Acknowledge Dive Center
          </button>`;
      }

      ackHtml = `
        <div class="ack-section" style="border-top: 1px dashed var(--border); margin-top: 16px; padding-top: 4px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          ${recPart}
          ${divPart}
        </div>`;
    }

    return `
      <div class="change-card ${cardClass}" id="${id}" style="${rowColor !== 'WHITE' ? `border-left: 3px solid ${rowColor} !important;` : ''}">
        <div class="card-header" onclick="toggleCard('${id}')">
          <div class="card-left">
            <span class="type-badge ${badgeClass}">${typeLabel}</span>
            <span class="card-title">${escapeHtml(String(cardTitle))}</span>
            ${remarkBadge}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="card-time">${formatTime(item.checkedAt)}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="card-body">
          ${bodyHtml}
          ${ackHtml}
        </div>
      </div>`;
  }

  // ── Build a single booking card ─────────────────────────────────────────────
  function buildBookingCard(booking, idx) {
    const id = `booking-${idx}`;
    const rowData = booking.row || [];
    const name = rowData[3] || '—'; // Customer Name
    const code = rowData[1] || '—'; // CODE
    const pic = rowData[2] || '—'; // PIC
    const checkIn = rowData[7] || '—';
    const checkOut = rowData[8] || '—';

    // Find ROOM, ROOM_PAX, ROW_COLOR and REMARK indices dynamically from bookingsHeaders
    const roomIndex = bookingsHeaders.findIndex(h => h && h.toString().trim().toUpperCase() === 'ROOM');
    const roomPaxIndex = bookingsHeaders.findIndex(h => h && h.toString().trim().toUpperCase() === 'ROOM_PAX');
    const colorIndex = bookingsHeaders.findIndex(h => h && h.toString().trim().toUpperCase() === 'ROW_COLOR');
    const remarkIndex = bookingsHeaders.findIndex(h => h && ['REMARK', 'REMARKS'].includes(h.toString().trim().toUpperCase()));
    
    const roomVal = roomIndex !== -1 ? (rowData[roomIndex] || '—') : '—';
    const roomPaxVal = roomPaxIndex !== -1 ? (rowData[roomPaxIndex] || '—') : '—';
    const rowColor = colorIndex !== -1 ? (rowData[colorIndex] || 'WHITE') : 'WHITE';
    const remarkVal = remarkIndex !== -1 ? (rowData[remarkIndex] || '') : (rowData[22] || '');

    // Determine status badge and border styling based on remark keywords and row color
    let remarkBadge = '';
    let cardLeftBorder = 'var(--accent)';
    let titleRemarkInfo = '';

    const isRowWhite = (rowColor === 'WHITE');
    const lowerRemark = remarkVal.toLowerCase();

    // Special remark check (cancel, postpone, double code, duplicate, etc.)
    const isSpecialRemark = lowerRemark.includes('cancel') || lowerRemark.includes('cancle') || lowerRemark.includes('cancled') || lowerRemark.includes('cancelled') ||
                           lowerRemark.includes('postpone') || lowerRemark.includes('postponed') ||
                           lowerRemark.includes('change') || lowerRemark.includes('changed') || lowerRemark.includes('chage') || lowerRemark.includes('chaged') ||
                           lowerRemark.includes('double') || lowerRemark.includes('dup');

    if (isRowWhite) {
      if (isSpecialRemark && remarkVal.toString().trim()) {
        let icon = '';
        let badgeText = '';
        let badgeBg = 'var(--red-bg)';
        let badgeColor = 'var(--red)';
        let badgeBorder = 'rgba(248,81,73,0.3)';

        if (lowerRemark.includes('cancel') || lowerRemark.includes('cancle') || lowerRemark.includes('cancled') || lowerRemark.includes('cancelled')) {
          icon = '❌ ';
          badgeText = '❌ Cancelled';
        } else if (lowerRemark.includes('postpone') || lowerRemark.includes('postponed')) {
          icon = '⏳ ';
          badgeText = '⏳ Postponed';
        } else if (lowerRemark.includes('change') || lowerRemark.includes('changed') || lowerRemark.includes('chage') || lowerRemark.includes('chaged')) {
          icon = '🔄 ';
          badgeText = '🔄 Changed';
        } else if (lowerRemark.includes('double') || lowerRemark.includes('dup')) {
          icon = '⚠️ ';
          badgeText = '⚠️ Double Code';
        }

        if (badgeText) {
          remarkBadge = `<span class="type-badge" style="background:${badgeBg};color:${badgeColor};border:1px solid ${badgeBorder};text-transform:none;margin-left:4px;display:inline-flex;align-items:center;gap:4px">${badgeText}</span>`;
        }
        titleRemarkInfo = `<span style="font-size:0.85rem;color:var(--text-secondary);font-weight:normal;margin-left:8px">${icon}• ${escapeHtml(remarkVal.toString().trim())}</span>`;
      }
    } else {
      // Row is colored. We ignore the remark and use the sheet color directly.
      cardLeftBorder = rowColor;
    }

    // Fields requested by user to display in detail table
    const fields = [
      { key: 'CODE', val: rowData[1] },
      { key: 'PIC', val: rowData[2] },
      { key: 'NAME', val: rowData[3] },
      { key: 'ROOM ASSIGNED', val: roomVal },
      { key: 'ROOM GUESTS (PAX)', val: roomPaxVal },
      { key: 'SNORKELLING', val: rowData[4] },
      { key: 'DIVING', val: rowData[5] },
      { key: 'COURSE', val: rowData[6] },
      { key: 'CHECK IN', val: rowData[7] },
      { key: 'CHECK OUT', val: rowData[8] },
      { key: 'STAYING DAYS', val: rowData[9] },
      { key: 'ROOM TYPE', val: rowData[10] },
      { key: 'SHARING', val: rowData[11] },
      { key: 'BED', val: rowData[12] },
      { key: 'SPECIAL REQUEST', val: rowData[13] },
      { key: 'REMARK', val: remarkVal },
    ];

    const rows = fields
      .map(f => {
        const val = (f.val || '').toString().trim();
        if (!val) return '';
        return `<tr><td style="color:var(--text-secondary);width:35%">${escapeHtml(f.key)}</td><td>${escapeHtml(val)}</td></tr>`;
      })
      .filter(Boolean)
      .join('');

    return `
      <div class="change-card" id="${id}" style="border-left: 3px solid ${cardLeftBorder}">
        <div class="card-header" onclick="toggleCard('${id}')">
          <div class="card-left">
            <span class="type-badge" style="background:var(--accent-glow);color:var(--accent);border:1px solid rgba(88,166,255,0.3)">${escapeHtml(String(code))}</span>
            <span class="card-title">${escapeHtml(String(name))}${titleRemarkInfo}</span>
            <span style="font-size:0.75rem;color:var(--text-muted)">(${escapeHtml(String(pic))})</span>
            ${roomVal && roomVal !== '—' ? `<span class="type-badge" style="background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(210,153,34,0.3);text-transform:none;margin-left:4px;display:inline-flex;align-items:center;gap:4px">🚪 Room: ${escapeHtml(String(roomVal))}</span>` : ''}
            ${remarkBadge}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            ${roomPaxVal && roomPaxVal !== '—' ? `<span class="type-badge" style="background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.3);text-transform:none;display:inline-flex;align-items:center;gap:4px">👤 ${escapeHtml(String(roomPaxVal))} Pax</span>` : ''}
            <span class="card-time" style="color:var(--text-secondary)">${escapeHtml(String(checkIn))} → ${escapeHtml(String(checkOut))}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="card-body">
          <table class="row-table" style="margin-top:12px">
            <thead><tr><th>Column</th><th>Value</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="2" style="color:var(--text-muted)">No data</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }

  function toggleCard(id) {
    document.getElementById(id).classList.toggle('open');
  }

  function formatTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Scroll to Top ───────────────────────────────────────────────────────────
  window.addEventListener('scroll', () => {
    const btn = document.getElementById('scroll-to-top-btn');
    if (btn) {
      if (window.scrollY > 300) {
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    }
  });

  function scrollToTop() {
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }

  // ── Auto-refresh every 2 minutes ────────────────────────────────────────────
  loadData();
  setInterval(loadData, 120_000);
</script>
<button class="scroll-to-top" id="scroll-to-top-btn" onclick="scrollToTop()" title="Scroll to top">▲</button>
</body>
</html>
